name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Render webhook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json" \
            --fail
        # Add RENDER_DEPLOY_HOOK_URL to GitHub Secrets:
        # Render → Your Service → Settings → Deploy Hook → copy URL
