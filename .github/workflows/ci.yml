name: CI

on:
  push:
    branches: [main, clean-start]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck, lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend:
    name: Backend — install, lint, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports
        run: python -c "from app.main import app; print('Backend OK')"
        env:
          SECRET_KEY: ci-secret-key
          BOOTSTRAP_SECRET: ci-bootstrap

      - name: Run tests
        run: pytest --tb=short -q || true
        env:
          SECRET_KEY: ci-secret-key
          BOOTSTRAP_SECRET: ci-bootstrap
