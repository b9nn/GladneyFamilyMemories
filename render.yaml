services:
  - type: web
    name: gladney-family-tree
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt &&
      cd ../frontend && npm ci && npm run build
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/auth/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: BOOTSTRAP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gladney-family-db
          property: connectionString
      - key: USE_CLOUD_STORAGE
        value: "true"
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: gladneyfamilymemories
      - key: SITE_URL
        value: https://mrtag.com
      - key: ADMIN_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        value: noreply@mrtag.com
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 10

databases:
  - name: gladney-family-db
    databaseName: gladney
    user: gladney
    region: oregon
    plan: starter
